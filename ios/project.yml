name: CoCoiOS
options:
  bundleIdPrefix: com.coco.ios
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  CoCoiOS:
    type: application
    platform: iOS
    sources:
      - path: CoCoiOS
        resources:
          - path: Resources/QuizData
            buildPhase: resources
          - path: Resources/CourseData
            buildPhase: resources
          - path: Resources/GlossaryData
            buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: CoCoiOS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.CLaov.M3EM
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: CoCoiOS/Info.plist
    entitlements:
      path: CoCoiOS/CoCoiOS.entitlements

  CoCoiOSWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
    settings:
      base:
        INFOPLIST_FILE: Widget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.CLaov.M3EM.widget
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: Widget/Info.plist
    entitlements:
      path: Widget/Widget.entitlements
    dependencies:
      - target: CoCoiOS
