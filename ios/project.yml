name: CoCoiOS
options:
  bundleIdPrefix: com.coco.ios
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  CoCoiOS:
    type: application
    platform: iOS
    sources:
      - path: CoCoiOS
        resources:
          - path: Resources/QuizData
            buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: CoCoiOS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.coco.ios
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
